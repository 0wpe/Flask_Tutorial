{% extends "base.html" %}
{% block body %}
<h1>Update Boat {{ boat.id }}</h1>

{% if error %}
<p style="color:red">{{ error }}</p>
{% endif %}
{% if success %}
<p style="color:green">{{ success }}</p>
{% endif %}

<form method="POST">
    <label>Name:</label>
    <input type="text" name="name" value="{{ boat.name }}" required><br>

    <label>Type:</label>
    <input type="text" name="type" value="{{ boat.type }}" required><br>

    <label>Owner ID:</label>
    <input type="number" name="owner_id" value="{{ boat.owner_id }}" required><br>

    <label>Rental Price:</label>
    <input type="number" step="0.01" name="rental_price" value="{{ boat.rental_price }}" required><br>

    <button type="submit">Update</button>
</form>

<a href="/boats">Back to Boats</a>
{% endblock %}
